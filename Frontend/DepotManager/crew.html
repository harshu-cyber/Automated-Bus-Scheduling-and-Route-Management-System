<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Management - DTCSL Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../Admin/admin.css">
</head>
<body data-page="crew">

    <main class="main-content">
        <section class="page active">
            <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 style="color:var(--text-main)">Crew Members</h2>
                <button class="btn-primary" onclick="openModal('crewModal')" style="background:#9FE870; color:#111; border:none; padding:12px 20px; border-radius:10px; font-weight:700; cursor:pointer;">
                    <i class="fas fa-plus"></i> Add Crew Member
                </button>
            </div>

            <div class="table-card">
                <div class="table-header"><h3>Crew Fleet</h3></div>
                <table class="data-table">
                    <thead>
                        <tr><th>ID</th><th>Name</th><th>Role</th><th>Phone</th><th>Assigned Bus</th><th>Depot</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="crewBody">
                        <!-- Dynamic -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="crewModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Crew Details</h3>
                <button class="modal-close" onclick="closeModal('crewModal')"><i class="fas fa-times"></i></button>
            </div>
            <form class="modal-body" id="crewForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-input" id="crewName" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-row" style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1">
                        <label>Role</label>
                        <select class="form-input" id="crewRole" name="role">
                            <option value="Driver">Driver</option>
                            <option value="Conductor">Conductor</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Phone (Used as Login Password)</label>
                        <input type="tel" class="form-input" id="crewPhone" name="phone" placeholder="10-digit mobile number" required>
                    </div>
                </div>
                <div class="form-row" style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1">
                        <label>License No. (Drivers only)</label>
                        <input type="text" class="form-input" id="crewLicense" name="licenseNo" placeholder="DL-XXXXXXXXXX">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Department / Depot</label>
                        <input type="text" class="form-input" id="crewDepot" name="depot" placeholder="e.g. Kashmiri Gate Depot" list="depotList" required>
                        <datalist id="depotList"></datalist>
                    </div>
                </div>
                <div class="form-row" style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1">
                        <label>Assign Bus</label>
                        <input type="text" class="form-input" id="crewAssignedBus" name="assignedBus" placeholder="Bus Reg No.">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Status</label>
                        <select class="form-input" id="crewStatus" name="status">
                            <option value="On Duty">On Duty</option>
                            <option value="Off Duty">Off Duty</option>
                            <option value="On Leave">On Leave</option>
                        </select>
                    </div>
                </div>
                <!-- Hidden Crew ID field for manual input if needed, but hidden by default -->
                <input type="hidden" id="crewIdField" name="crewId">

                <div class="modal-footer" style="margin-top:20px; text-align:right;">
                    <button type="button" class="btn-secondary" onclick="closeModal('crewModal')" style="padding:10px 20px; border-radius:8px; border:1px solid var(--border-color); background:transparent; color:var(--text-main); margin-right:10px; cursor:pointer;">Cancel</button>
                    <button type="submit" class="btn-primary" id="saveCrewBtn" style="padding:10px 20px; border-radius:8px; border:none; background:#9FE870; color:#111; font-weight:700; cursor:pointer;">Save Member</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../components/ui.js"></script>
    <script src="../components/api.js"></script>
    <script src="../Admin/admin.js"></script>
    <script>
        document.getElementById('crewForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveCrewBtn');
            const originalText = btn.textContent;
            
            const modal = document.getElementById('crewModal');
            const id = modal.dataset.editId;
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                let res;
                if (id) {
                    res = await API.updateRes('crew', id, data);
                    if (res) {
                        UI.showAlert('Crew member updated successfully!');
                        closeModal('crewModal');
                        loadCrew();
                    }
                } else {
                    res = await API.fetch('/crew', { method: 'POST', body: JSON.stringify(data) });
                    if (res && res.credentials) {
                        const { username, password } = res.credentials;
                        alert(`✅ CREW MEMBER ADDED SUCCESSFULLY!\n\n----------------------------------\nLOGIN CREDENTIALS:\n----------------------------------\nUsername: ${username}\nPassword: ${password}\n----------------------------------\n\nPlease share these credentials with the crew member.`);
                        closeModal('crewModal');
                        loadCrew();
                    } else {
                        // If res is null, it means API.fetch already showed an error alert banner
                        console.error("Save failed: Response is null or missing credentials");
                    }
                }
            } catch (err) {
                console.error("Submit error:", err);
                alert("Error saving crew member: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        };
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('dtcsl_user') || '{}');
            const depotInput = document.getElementById('crewDepot');
            if (user.depot && depotInput) {
                depotInput.value = user.depot;
                // Removed readonly to allow typing as requested
            }
            
            // Populate datalist for autocomplete
            const depots = await API.getDepots();
            const depotList = document.getElementById('depotList');
            if (depots && depotList) {
                depots.forEach(d => {
                    const option = document.createElement('option');
                    option.value = d.name;
                    depotList.appendChild(option);
                });
            }
        });
    </script>
</body>
</html>
