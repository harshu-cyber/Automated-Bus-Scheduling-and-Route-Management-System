<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Management - DTCSL Depot Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../Admin/admin.css">
    <link rel="stylesheet" href="../components/route-cards.css">
    <style>
        .stops-form-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; max-height: 260px; overflow-y: auto; padding-right: 4px; }
        .stop-input-row { display: flex; align-items: center; gap: 8px; }
        .stop-input-row input { flex: 1; }
        .stop-num { font-size: 11px; font-weight: 700; color: #9FE870; min-width: 24px; text-align: center; }
        .stop-remove-btn {
            width: 28px; height: 28px; border: none; border-radius: 6px;
            background: #ef444420; color: #ef4444; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
            transition: background 0.2s; flex-shrink: 0;
        }
        .stop-remove-btn:hover { background: #ef444440; }
        .stop-add-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 100%; padding: 10px; border-radius: 8px;
            border: 1.5px dashed #9FE87040; background: transparent; color: #9FE870;
            font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 13px;
            cursor: pointer; transition: all 0.2s;
        }
        .stop-add-btn:hover { border-color: #9FE870; background: #9FE87010; }
        .auto-field { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; background: #0f131a; border: 1px solid var(--border-color, #2a2f3e); }
        .auto-field-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .auto-field-value { font-size: 15px; font-weight: 700; color: #9FE870; }
        .auto-field-icon { color: #38bdf8; font-size: 14px; margin-right: 4px; }
    </style>
</head>
<body data-page="routes">

    <main class="main-content">
        <section class="page active">
            <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 style="color:var(--text-main)">Route Management</h2>
                <button class="btn-primary" onclick="openAddRouteModal()" style="background:#9FE870; color:#111; border:none; padding:12px 20px; border-radius:10px; font-weight:700; cursor:pointer;">
                    <i class="fas fa-plus"></i> Add New Route
                </button>
            </div>
            <div id="routeCardsContainer" class="route-cards-grid">
                <div style="text-align:center; padding:40px; color:#64748b;">Loading routes...</div>
            </div>
        </section>
    </main>

    <!-- Add/Edit Route Modal -->
    <div class="modal-overlay" id="routeModal">
        <div class="modal" style="max-width:520px;">
            <div class="modal-header">
                <h3 id="routeModalTitle">Add New Route</h3>
                <button class="modal-close" onclick="closeModal('routeModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Route ID</label>
                    <div class="auto-field">
                        <span class="auto-field-icon"><i class="fas fa-hashtag"></i></span>
                        <div>
                            <div class="auto-field-label">Auto-Generated</div>
                            <div class="auto-field-value" id="autoRouteId">RT-XXX</div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Route Name</label>
                    <input type="text" class="form-input" id="routeName" placeholder="e.g. Kashmiri Gate → Chandni Chowk" required>
                </div>
                <div class="form-group">
                    <label style="display:flex; justify-content:space-between; align-items:center;">
                        <span>Stoppages <small style="color:#64748b;">(in order)</small></span>
                        <span id="stopCount" style="font-size:12px; color:#9FE870; font-weight:600;">0 stops</span>
                    </label>
                    <div class="stops-form-list" id="stopsFormList"></div>
                    <button type="button" class="stop-add-btn" onclick="addStopInput()">
                        <i class="fas fa-plus"></i> Add Stoppage
                    </button>
                </div>
                <div class="form-group">
                    <label>Estimated Distance</label>
                    <div class="auto-field">
                        <span class="auto-field-icon"><i class="fas fa-road"></i></span>
                        <div>
                            <div class="auto-field-label">Auto-Calculated</div>
                            <div class="auto-field-value" id="autoDistance">0 km</div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select class="form-input" id="routeStatus">
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                        <option value="Maintenance">Maintenance</option>
                    </select>
                </div>
                <div class="modal-footer" style="margin-top:20px; text-align:right;">
                    <button type="button" onclick="closeModal('routeModal')" style="padding:10px 20px; border-radius:8px; border:1px solid var(--border-color); background:transparent; color:var(--text-main); margin-right:10px; cursor:pointer;">Cancel</button>
                    <button type="button" onclick="submitRoute()" style="padding:10px 20px; border-radius:8px; border:none; background:#9FE870; color:#111; font-weight:700; cursor:pointer;">Save Route</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../components/ui.js"></script>
    <script src="../components/api.js"></script>
    <script src="../components/route-cards.js"></script>
    <script src="../Admin/admin.js"></script>
    <script>
        async function loadRoutes() {
            const user = JSON.parse(localStorage.getItem('dtcsl_user') || '{}');
            const data = await API.getRoutes(user.depot ? { depot: user.depot } : undefined);
            if (data) RouteCards.render('routeCardsContainer', data, { editable: true });
        }
        document.addEventListener('DOMContentLoaded', () => loadRoutes());

        function openAddRouteModal() {
            document.getElementById('routeModalTitle').textContent = 'Add New Route';
            document.getElementById('routeName').value = '';
            document.getElementById('routeStatus').value = 'Active';
            document.getElementById('stopsFormList').innerHTML = '';
            document.getElementById('autoRouteId').textContent = 'Auto-Generated';
            document.getElementById('autoDistance').textContent = '0 km';
            document.getElementById('stopCount').textContent = '0 stops';
            delete document.getElementById('routeModal').dataset.editId;
            addStopInput('');
            addStopInput('');
            openModal('routeModal');
        }

        function addStopInput(value = '') {
            const list = document.getElementById('stopsFormList');
            const idx = list.children.length + 1;
            const row = document.createElement('div');
            row.className = 'stop-input-row';
            row.innerHTML = `
                <span class="stop-num">${String(idx).padStart(2, '0')}</span>
                <input type="text" class="form-input stop-name-input" placeholder="Enter stop name" value="${value}" oninput="recalcRoute()">
                <button type="button" class="stop-remove-btn" onclick="removeStopInput(this)" title="Remove"><i class="fas fa-times"></i></button>
            `;
            list.appendChild(row);
            recalcRoute();
            row.querySelector('input').focus();
        }

        function removeStopInput(btn) {
            const list = document.getElementById('stopsFormList');
            if (list.children.length <= 2) { UI.showAlert('A route needs at least 2 stops', 'error'); return; }
            btn.closest('.stop-input-row').remove();
            Array.from(list.children).forEach((row, i) => { row.querySelector('.stop-num').textContent = String(i + 1).padStart(2, '0'); });
            recalcRoute();
        }

        function recalcRoute() {
            const inputs = document.querySelectorAll('#stopsFormList .stop-name-input');
            const stops = Array.from(inputs).map(i => i.value.trim()).filter(v => v);
            document.getElementById('stopCount').textContent = `${stops.length} stops`;
            const dist = stops.length >= 2 ? ((stops.length - 1) * 1.5).toFixed(1) : '0';
            document.getElementById('autoDistance').textContent = `${dist} km`;
            if (stops.length >= 2) {
                const nameInput = document.getElementById('routeName');
                if (!nameInput.dataset.manual) nameInput.value = `${stops[0]} → ${stops[stops.length - 1]}`;
            }
        }
        document.getElementById('routeName').addEventListener('input', function() { this.dataset.manual = 'true'; });

        async function submitRoute() {
            const modal = document.getElementById('routeModal');
            const editId = modal.dataset.editId;
            const inputs = document.querySelectorAll('#stopsFormList .stop-name-input');
            const stopNames = Array.from(inputs).map(i => i.value.trim()).filter(v => v);
            if (stopNames.length < 2) { UI.showAlert('Add at least 2 stoppages', 'error'); return; }
            const name = document.getElementById('routeName').value.trim();
            if (!name) { UI.showAlert('Route name is required', 'error'); return; }
            const user = JSON.parse(localStorage.getItem('dtcsl_user') || '{}');
            const data = { 
                name, stopNames, status: document.getElementById('routeStatus').value, 
                startPoint: stopNames[0], endPoint: stopNames[stopNames.length - 1], 
                stops: stopNames.length, distance: parseFloat(((stopNames.length - 1) * 1.5).toFixed(1)),
                depot: user.depot // Add the depot!
            };
            let res;
            if (editId) { res = await API.updateRes('routes', editId, data); }
            else { res = await API.fetch('/routes', { method: 'POST', body: JSON.stringify(data) }); }
            if (res) { UI.showAlert(editId ? 'Route updated!' : `Route ${res.routeId} created!`); closeModal('routeModal'); loadRoutes(); }
        }

        async function editRoute(id) {
            const item = await API.fetch(`/routes/${id}`);
            if (!item) return;
            document.getElementById('routeModalTitle').textContent = 'Edit Route';
            document.getElementById('routeName').value = item.name || '';
            document.getElementById('routeName').dataset.manual = 'true';
            document.getElementById('routeStatus').value = item.status || 'Active';
            document.getElementById('autoRouteId').textContent = item.routeId;
            document.getElementById('stopsFormList').innerHTML = '';
            if (item.stopNames && item.stopNames.length) { item.stopNames.forEach(s => addStopInput(s)); }
            else { addStopInput(item.startPoint || ''); addStopInput(item.endPoint || ''); }
            document.getElementById('routeModal').dataset.editId = id;
            recalcRoute();
            openModal('routeModal');
        }
    </script>
</body>
</html>
