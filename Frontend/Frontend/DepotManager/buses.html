<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigned Buses - Depot Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../Admin/admin.css">
</head>
<body data-page="depot-buses">

    <main class="main-content">
        <section class="page active">
            <div class="page-header" style="margin-bottom:30px;">
                <h2 style="color:var(--text-main)">Buses at My Depot</h2>
                <p style="color:var(--text-muted)">Overview of the fleet currently managed by your location.</p>
            </div>

            <div class="table-card">
                <table class="data-table">
                    <thead>
                        <tr><th>Reg. No</th><th>Type</th><th>Capacity</th><th>Status</th><th>Last Service</th></tr>
                    </thead>
                    <tbody id="busesBody">
                        <tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text-muted)">Loading your fleet...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../components/ui.js"></script>
    <script src="../components/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('dtcsl_user') || '{}');
            const depotName = user.location || 'Central Depot';
            
            const buses = await API.getBuses({ depot: depotName });
            const tbody = document.getElementById('busesBody');
            
            if (buses && buses.length > 0) {
                tbody.innerHTML = buses.map(b => `
                    <tr>
                        <td><strong>${b.regNo}</strong></td>
                        <td>${b.type}</td>
                        <td>${b.capacity}</td>
                        <td><span class="badge ${b.status === 'Active' ? 'badge-green' : 'badge-red'}">${b.status}</span></td>
                        <td>${new Date(b.lastService).toLocaleDateString()}</td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text-muted)">No buses currently assigned to this depot.</td></tr>';
            }
        });
    </script>
</body>
</html>
