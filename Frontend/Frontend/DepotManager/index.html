<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Manager - DTCSL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../Admin/admin.css">
    <style>
        .depot-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .depot-card { background: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border-color); }
        .depot-val { font-size: 32px; font-weight: 700; color: var(--text-main); }
        .depot-lab { color: var(--text-muted); font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body data-page="depot-dashboard">

    <main class="main-content">
        <section class="page active">
            <div class="depot-stats" id="statsGrid">
                <div class="depot-card">
                    <div class="depot-val" id="busCount">0</div>
                    <div class="depot-lab">Buses at Depot</div>
                </div>
                <div class="depot-card">
                    <div class="depot-val" id="routeCount">0</div>
                    <div class="depot-lab">Routes Managed</div>
                </div>
                <div class="depot-card">
                    <div class="depot-val" id="driverCount">0</div>
                    <div class="depot-lab">Drivers Available</div>
                </div>
            </div>

            <div class="table-card">
                <div class="table-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>Today's Depot Schedule</h3>
                    <button class="btn-primary" id="autoGenBtn" style="background:#9FE870; color:#111; border:none; padding:10px 18px; border-radius:10px; font-weight:700; cursor:pointer;">
                        <i class="fas fa-magic"></i> Auto-Generate Schedule
                    </button>
                </div>
                <table class="data-table">
                    <thead>
                        <tr><th>Time</th><th>Bus</th><th>Route</th><th>Driver</th><th>Status</th></tr>
                    </thead>
                    <tbody id="scheduleBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../components/ui.js"></script>
    <script src="../components/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('dtcsl_user') || '{}');
            const depotName = user.location || 'Central Depot';
            
            // 1. Fetch data
            const buses = await API.getBuses({ depot: depotName });
            const schedules = await API.getSchedule();
            const drivers = await API.getCrew('Driver');

            // 2. Update Stats
            document.getElementById('busCount').innerText = buses?.length || 0;
            document.getElementById('routeCount').innerText = [...new Set(schedules?.map(s => s.route))].length || 0;
            document.getElementById('driverCount').innerText = drivers?.filter(d => d.status === 'Available').length || 0;

            // 3. Update Table
            const tbody = document.getElementById('scheduleBody');
            if (schedules) {
                tbody.innerHTML = schedules.slice(0, 10).map(s => `
                    <tr>
                        <td><strong>${s.time}</strong></td>
                        <td>${s.bus}</td>
                        <td>${s.route}</td>
                        <td>${s.driver}</td>
                        <td><span class="badge badge-green">Ready</span></td>
                    </tr>
                `).join('');
            }
            // 4. Auto-Generate Button
            const autoGenBtn = document.getElementById('autoGenBtn');
            if (autoGenBtn) {
                autoGenBtn.onclick = async () => {
                    autoGenBtn.disabled = true;
                    autoGenBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
                    const res = await API.generateSchedule();
                    if (res) {
                        UI.showAlert(`Generated ${res.count} trips!`);
                        // Reload data
                        const newSchedules = await API.getSchedule();
                        tbody.innerHTML = newSchedules.slice(0, 10).map(s => `
                            <tr>
                                <td><strong>${s.time}</strong></td>
                                <td>${s.bus}</td>
                                <td>${s.route}</td>
                                <td>${s.driver}</td>
                                <td><span class="badge badge-green">Ready</span></td>
                            </tr>
                        `).join('');
                    }
                    autoGenBtn.disabled = false;
                    autoGenBtn.innerHTML = '<i class="fas fa-magic"></i> Auto-Generate Schedule';
                };
            }
        });
    </script>
</body>
</html>
