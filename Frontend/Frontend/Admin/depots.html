<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depot Management - DTCSL Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body data-page="depots">

    <main class="main-content">
        <section class="page active">
            <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 style="color:var(--text-main)">Depot Management</h2>
                <button class="btn-primary" onclick="openModal('depotModal')" style="background:#9FE870; color:#111; border:none; padding:12px 20px; border-radius:10px; font-weight:700; cursor:pointer;">
                    <i class="fas fa-plus"></i> Add New Depot
                </button>
            </div>

            <div class="depot-grid">
                <!-- Dynamic Content from admin.js -->
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="depotModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Depot Details</h3>
                <button class="modal-close" onclick="closeModal('depotModal')"><i class="fas fa-times"></i></button>
            </div>
            <form class="modal-body" id="depotForm">
                <div class="form-group">
                    <label>Depot Name</label>
                    <input type="text" class="form-input" name="name" placeholder="e.g. Kashmiri Gate Depot" required>
                </div>
                <div class="form-row" style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1">
                        <label>Location</label>
                        <input type="text" class="form-input" name="location" placeholder="Address">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Capacity</label>
                        <input type="number" class="form-input" name="busCount" placeholder="50">
                    </div>
                </div>
                <div class="modal-footer" style="margin-top:20px; text-align:right;">
                    <button type="button" class="btn-secondary" onclick="closeModal('depotModal')" style="padding:10px 20px; border-radius:8px; border:1px solid var(--border-color); background:transparent; color:var(--text-main); margin-right:10px; cursor:pointer;">Cancel</button>
                    <button type="submit" class="btn-primary" style="padding:10px 20px; border-radius:8px; border:none; background:#9FE870; color:#111; font-weight:700; cursor:pointer;">Save Depot</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../components/ui.js"></script>
    <script src="../components/api.js"></script>
    <script src="admin.js"></script>
    <script>
        document.getElementById('depotForm').onsubmit = async (e) => {
            e.preventDefault();
            const modal = document.getElementById('depotModal');
            const id = modal.dataset.editId;
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            let res;
            if (id) {
                res = await API.updateRes('depots', id, data);
            } else {
                res = await API.fetch('/depots', { method: 'POST', body: JSON.stringify(data) });
            }

            if (res) {
                UI.showAlert('Depot saved successfully!');
                closeModal('depotModal');
                loadDepots();
            }
        };
    </script>
</body>
</html>
