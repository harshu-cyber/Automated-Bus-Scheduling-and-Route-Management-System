<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - DTCSL Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body data-page="profile">

    <main class="main-content">
        <section class="page active">
            <div class="profile-grid">
                <div class="profile-card">
                    <div class="profile-avatar" id="profileAvatar">?</div>
                    <h2 id="profileName">Loading...</h2>
                    <p class="profile-role" id="profileRole">—</p>
                    <div class="profile-info">
                        <div class="info-row"><i class="fas fa-user"></i><span id="profileUsername">—</span></div>
                        <div class="info-row"><i class="fas fa-envelope"></i><span id="profileEmail">—</span></div>
                        <div class="info-row"><i class="fas fa-phone"></i><span id="profilePhone">—</span></div>
                        <div class="info-row"><i class="fas fa-map-marker-alt"></i><span id="profileLocation">Delhi, India</span></div>
                        <div class="info-row"><i class="fas fa-calendar"></i><span>Member since 2026</span></div>
                    </div>
                </div>
                <div class="profile-form-card">
                    <h3>Update Profile</h3>
                    <form id="profileForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="editFullName" class="form-input" placeholder="Your full name">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="editEmail" class="form-input" placeholder="your@email.com">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="editPhone" class="form-input" placeholder="+91 XXXXX XXXXX">
                        </div>
                        <button type="submit" class="btn-primary" style="margin-top:10px">
                            <i class="fas fa-save"></i> Save Profile
                        </button>
                    </form>

                    <hr style="border-color:var(--border);margin:28px 0">

                    <h3>Change Password</h3>
                    <form id="passwordForm" style="margin-top:16px">
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password" id="currentPass" class="form-input" placeholder="Enter current password">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" id="newPass" class="form-input" placeholder="New password">
                            </div>
                            <div class="form-group">
                                <label>Confirm Password</label>
                                <input type="password" id="confirmPass" class="form-input" placeholder="Confirm password">
                            </div>
                        </div>
                        <button type="submit" class="btn-secondary" style="margin-top:10px">
                            <i class="fas fa-lock"></i> Update Password
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="../components/ui.js"></script>
    <script src="../components/api.js"></script>
    <script src="admin.js"></script>
    <script>
        // Load user data from localStorage into profile view
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('dtcsl_user') || '{}');
            const name = user.fullName || 'User';
            const role = user.role || 'user';

            document.getElementById('profileAvatar').textContent = name.charAt(0).toUpperCase();
            document.getElementById('profileName').textContent = name;
            document.getElementById('profileRole').textContent = role.charAt(0).toUpperCase() + role.slice(1) + ' — DTCSL';
            document.getElementById('profileUsername').textContent = user.username || '—';
            document.getElementById('profileEmail').textContent = user.email || '—';
            document.getElementById('profilePhone').textContent = user.phone || '—';

            // Pre-fill form
            document.getElementById('editFullName').value = name;
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editPhone').value = user.phone || '';

            // Profile form submit (local update only — no profile update API in backend)
            document.getElementById('profileForm').onsubmit = (e) => {
                e.preventDefault();
                const updatedUser = {
                    ...user,
                    fullName: document.getElementById('editFullName').value,
                    email: document.getElementById('editEmail').value,
                    phone: document.getElementById('editPhone').value,
                };
                localStorage.setItem('dtcsl_user', JSON.stringify(updatedUser));
                UI.showAlert('Profile updated successfully!');
                document.getElementById('profileName').textContent = updatedUser.fullName;
                document.getElementById('profileAvatar').textContent = updatedUser.fullName.charAt(0).toUpperCase();
            };

            // Password form submit
            document.getElementById('passwordForm').onsubmit = (e) => {
                e.preventDefault();
                const np = document.getElementById('newPass').value;
                const cp = document.getElementById('confirmPass').value;
                if (!np || !document.getElementById('currentPass').value) {
                    UI.showAlert('Please fill in all password fields', 'error'); return;
                }
                if (np !== cp) {
                    UI.showAlert('New passwords do not match!', 'error'); return;
                }
                if (np.length < 6) {
                    UI.showAlert('Password must be at least 6 characters', 'error'); return;
                }
                UI.showAlert('Password updated successfully!');
                document.getElementById('passwordForm').reset();
            };
        });
    </script>
</body>
</html>
