<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Fleet Tracking - DTCSL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../Admin/admin.css">
    <style>
        #liveMap { height: calc(100vh - 150px); border-radius: 20px; border: 1px solid var(--border-color); background: #111; position: relative; z-index: 1; }
        .map-overlay-info { position: absolute; top: 20px; right: 20px; z-index: 1000; background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); pointer-events: none; }
    </style>
</head>
<body data-page="passenger-tracking">

    <main class="main-content">
        <section class="page active">
            <div class="page-header" style="margin-bottom:30px;">
                <h2 style="color:var(--text-main)">Global Live Tracking</h2>
                <p style="color:var(--text-muted)">Real-time map showing all active buses in the network.</p>
            </div>

            <div id="liveMap"></div>
            <div class="map-overlay-info">
                <div style="font-weight:700; color:#9FE870; display:flex; align-items:center; gap:8px;">
                    <i class="fas fa-satellite-dish"></i> <span>Live Satellite Uplink</span>
                </div>
                <div style="font-size:12px; color:var(--text-muted); margin-top:5px;">Connected to Socket.io cluster</div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="../components/ui.js"></script>
    <script src="../components/api.js"></script>
    <script src="../components/socket_client.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const map = L.map('liveMap').setView([28.6139, 77.2090], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            const busMarkers = {};
            const socket = SocketClient.connect();

            socket.on('locationUpdate', (data) => {
                const { busId, lat, lng, routeId } = data;
                if (!busMarkers[busId]) {
                    busMarkers[busId] = L.marker([lat, lng]).addTo(map)
                        .bindPopup(`<b>Bus: ${busId}</b><br>Route: ${routeId}`);
                } else {
                    busMarkers[busId].setLatLng([lat, lng]);
                }
            });
        });
    </script>
</body>
</html>
