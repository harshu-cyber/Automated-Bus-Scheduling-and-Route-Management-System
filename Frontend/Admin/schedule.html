<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Management - DTCSL Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body data-page="schedule">

    <main class="main-content">
        <section class="page active">
            <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 style="color:var(--text)">Timetable Overview</h2>
                <div class="page-actions" style="display:flex; gap:10px;">
                    <button class="btn-secondary" onclick="openModal('scheduleModal')">
                        <i class="fas fa-plus"></i> Manual Entry
                    </button>
                </div>
            </div>

            <div class="schedule-grid">
                <!-- Dynamic Content from admin.js -->
            </div>
        </section>
    </main>

    <!-- Manual Schedule Entry Modal -->
    <div class="modal-overlay" id="scheduleModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Add Schedule Entry</h3>
                <button class="modal-close" onclick="closeModal('scheduleModal')"><i class="fas fa-times"></i></button>
            </div>
            <form class="modal-body" id="scheduleForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Day</label>
                        <select class="form-input" name="day" id="schedDay">
                            <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
                            <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" class="form-input" name="time" id="schedTime" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Route ID</label>
                        <input type="text" class="form-input" name="route" id="schedRoute" placeholder="e.g. RT-001" required>
                    </div>
                    <div class="form-group">
                        <label>Route Name</label>
                        <input type="text" class="form-input" name="routeName" id="schedRouteName" placeholder="e.g. Kashmiri Gate" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Bus Reg. No.</label>
                        <input type="text" class="form-input" name="bus" id="schedBus" placeholder="e.g. DL-1PA-1234" required>
                    </div>
                    <div class="form-group">
                        <label>Driver Name</label>
                        <input type="text" class="form-input" name="driver" id="schedDriver" placeholder="e.g. Rajesh Kumar" required>
                    </div>
                </div>
                <div class="modal-footer" style="margin-top:20px;">
                    <button type="button" class="btn-secondary" onclick="closeModal('scheduleModal')">Cancel</button>
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Entry</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../components/ui.js"></script>
    <script src="../components/api.js"></script>
    <script src="admin.js"></script>
    <script>
        document.getElementById('scheduleForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            const id = document.getElementById('scheduleModal').dataset.editId;
            let res;
            if (id) {
                res = await API.updateRes('schedule', id, data);
            } else {
                res = await API.fetch('/schedule', { method: 'POST', body: JSON.stringify(data) });
            }
            if (res) {
                UI.showAlert(id ? 'Schedule updated!' : 'Schedule entry added successfully!');
                closeModal('scheduleModal');
                loadSchedule();
            }
        };
    </script>
</body>
</html>
