<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracking - DTCSL Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="admin.css">
    <style>
        .tracking-map-wrap { height: clamp(350px, 50vh, 600px); margin-top: 20px; position: relative; }
        .live-label { position: absolute; top: 20px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.7); color: #9FE870; padding: 10px 20px; border-radius: 100px; font-weight: 700; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(4px); }
        .live-dot { width: 10px; height: 10px; background: #9FE870; border-radius: 50%; box-shadow: 0 0 8px #9FE870; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        #trackingMap { height: 100%; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); }
        .bus-marker-label { background: white; border: 1px solid #111; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; color: #111; text-align: center; }
    </style>
</head>
<body data-page="tracking">

    <main class="main-content">
        <section class="page active">
            <div class="tracking-map-wrap">
                <div class="live-label">
                    <div class="live-dot"></div>
                    <span>Broadcasting Global Network</span>
                </div>
                <div id="trackingMap"></div>
            </div>

            <div class="table-card" style="margin-top: 30px;">
                <div class="table-header"><h3>Active Buses Network</h3></div>
                <table class="data-table">
                    <thead><tr><th>Bus</th><th>Driver</th><th>Location</th><th>Status</th></tr></thead>
                    <tbody id="trackTable">
                        <tr><td colspan="4" style="text-align:center; padding:20px; color:var(--text-muted)">No active buses detected...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../components/ui.js"></script>
    <script src="../components/api.js"></script>
    <script src="../components/socket_client.js"></script>
    <script>
        let map, markers = {};

        document.addEventListener('DOMContentLoaded', () => {
            map = L.map('trackingMap').setView([28.6139, 77.2090], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            SocketClient.onLocationUpdate((data) => {
                const { busRegNo, lat, lng, driverName } = data;
                
                // Update Map
                if (markers[busRegNo]) {
                    markers[busRegNo].setLatLng([lat, lng]);
                } else {
                    const icon = L.divIcon({
                        className: 'custom-bus-icon',
                        html: `<div style="background:#000; color:#9FE870; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid #9FE870; font-size:16px;">🚌</div><div class="bus-marker-label">${busRegNo}</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    });
                    markers[busRegNo] = L.marker([lat, lng], { icon }).addTo(map)
                        .bindPopup(`<b>${busRegNo}</b><br>Driver: ${driverName}`);
                }

                // Update Table
                const tbody = document.getElementById('trackTable');
                if(tbody.innerText.includes('No active')) tbody.innerHTML = '';
                
                const rowId = `row-${busRegNo}`;
                let row = document.getElementById(rowId);
                if (!row) {
                    row = document.createElement('tr');
                    row.id = rowId;
                    tbody.appendChild(row);
                }
                row.innerHTML = `
                    <td><strong>${busRegNo}</strong></td>
                    <td>${driverName}</td>
                    <td>${lat.toFixed(4)}, ${lng.toFixed(4)}</td>
                    <td><span class="badge badge-green">LIVE</span></td>
                `;
            });
        });
    </script>
</body>
</html>
