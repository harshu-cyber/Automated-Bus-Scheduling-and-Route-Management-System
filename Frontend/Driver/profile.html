<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - DTCSL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../Admin/admin.css">
</head>
<body data-page="profile">

    <main class="main-content">
        <section class="page active">
            <div class="page-header" style="margin-bottom:30px;">
                <h2 style="color:var(--text-main)">My Profile</h2>
                <p style="color:var(--text-muted)">Manage your personal information and account security.</p>
            </div>

            <div class="table-card" style="max-width: 800px; padding: 40px;">
                <form id="profileForm">
                    <div class="form-group" style="margin-bottom:20px;">
                        <label>Full Name</label>
                        <input type="text" class="form-input" id="userName" name="fullName" placeholder="User Name">
                    </div>
                    <div class="form-row" style="display:flex; gap:20px; margin-bottom:20px;">
                        <div class="form-group" style="flex:1">
                            <label>Email Address</label>
                            <input type="email" class="form-input" id="userEmail" name="email" placeholder="email@example.com">
                        </div>
                        <div class="form-group" style="flex:1">
                            <label>Phone Number</label>
                            <input type="tel" class="form-input" id="userPhone" name="phone" placeholder="+91 XXXXX XXXXX">
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom:30px;">
                        <label>Assigned Location / Depot</label>
                        <input type="text" class="form-input" id="userLocation" name="location" readonly style="background:rgba(255,255,255,0.02)">
                    </div>

                    <div style="border-top:1px solid var(--border-color); padding-top:20px; text-align:right;">
                        <button type="submit" class="btn-primary" style="padding:12px 30px; border-radius:10px; border:none; background:#9FE870; color:#111; font-weight:700; cursor:pointer;">Update Profile</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="../components/ui.js"></script>
    <script src="../components/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('dtcsl_user') || '{}');
            document.getElementById('userName').value = user.fullName || '';
            document.getElementById('userEmail').value = user.email || '';
            document.getElementById('userPhone').value = user.phone || '';
            document.getElementById('userLocation').value = user.location || 'N/A';

            document.getElementById('profileForm').onsubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                
                // In a real app, we'd update via API. For demo, we'll update local storage and show alert.
                const newUser = { ...user, ...data };
                localStorage.setItem('dtcsl_user', JSON.stringify(newUser));
                UI.showAlert('Profile Updated Successfully!');
            };
        });
    </script>
</body>
</html>
