<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver - DTCSL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../Admin/admin.css">
    <style>
        .trip-card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 40px; text-align: center; max-width: 600px; margin: 40px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .trip-status { display: inline-block; padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; }
        .status-idle { background: rgba(255,255,255,0.05); color: var(--text-muted); }
        .status-active { background: rgba(159,232,112,0.15); color: #9FE870; border: 1px solid rgba(159,232,112,0.3); }
        .trip-info h2 { font-size: 32px; margin-bottom: 8px; color: var(--text-main); }
        .trip-info p { color: var(--text-muted); font-size: 16px; margin-bottom: 30px; }
        .trip-controls { display: flex; gap: 15px; justify-content: center; }
        .btn-large { padding: 18px 40px; border-radius: 12px; font-weight: 700; font-size: 16px; border: none; cursor: pointer; transition: 0.3s; }
        .btn-green { background: #9FE870; color: #111; }
        .btn-green:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(159,232,112,0.3); }
        .btn-red { background: #ef4444; color: white; }
        .btn-red:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(239,68,68,0.3); }
        .tracking-status { margin-top: 30px; font-size: 13px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 8px; opacity: 0; transition: 0.5s; }
        .tracking-status.visible { opacity: 1; }
        .gps-pulse { width: 10px; height: 10px; border-radius: 50%; background: #9FE870; box-shadow: 0 0 10px #9FE870; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(159,232,112, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(159,232,112, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(159,232,112, 0); } }
        
        /* Map Styles */
        #driverMap { height: 250px; border-radius: 12px; border: 1px solid var(--border); margin-top: 25px; display: none; z-index: 1; }
        .leaflet-marker-icon { transition: all 1s linear; }
    </style>
</head>
<body data-page="driver-trips">

    <main class="main-content">
        <section class="page active">
            <div class="trip-card">
                <span class="trip-status status-idle" id="tripLabel">Not Started</span>
                <div class="trip-info">
                    <h2 id="routeLabel">Select Trip 🚌</h2>
                    <p id="busLabel">Assigned Bus: Ready</p>
                </div>

                <div class="trip-controls">
                    <button class="btn-large btn-green" id="startBtn"><i class="fas fa-play"></i> Start Trip</button>
                    <button class="btn-large btn-red" id="endBtn" style="display:none"><i class="fas fa-stop"></i> End Trip</button>
                </div>

                <div class="tracking-status" id="trackingStatus">
                    <div class="gps-pulse"></div>
                    <span>Sending Live GPS Location (Every 3s)</span>
                </div>

                <!-- Driver Map showing active route -->
                <div id="driverMap"></div>
            </div>

            <div class="table-card">
                <div class="table-header"><h3>My Assignment List</h3></div>
                <table class="data-table">
                    <thead><tr><th>Time</th><th>Route</th><th>Bus</th><th>Action</th></tr></thead>
                    <tbody id="myAssigns"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../components/ui.js"></script>
    <script src="../components/api.js"></script>
    <script src="../components/socket_client.js"></script>
    <script>
        let trackingInterval = null;
        let activeTrip = null;
        let map = null;
        let routeLayer = null;
        let driverMarker = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('dtcsl_user') || '{}');
            const params = user.depot ? { depot: user.depot } : undefined;
            const schedules = await API.getSchedule(params);
            const myTrips = schedules?.filter(s => s.driver === user.fullName) || [];
            
            const tbody = document.getElementById('myAssigns');
            if (myTrips.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; color:var(--text-muted);">No assignments yet. Awaiting schedule from Depot Manager.</td></tr>';
            } else {
                tbody.innerHTML = myTrips.map(s => {
                    const dateLabel = s.date
                        ? new Date(s.date + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })
                        : '';
                    const routeDisplay = s.routeName ? `${s.route} — ${s.routeName}` : s.route;
                    return `
                        <tr>
                            <td>${s.time}${dateLabel ? `<br><small style="color:var(--text-muted)">${s.day}, ${dateLabel}</small>` : ''}</td>
                            <td>${routeDisplay}</td>
                            <td>${s.bus}</td>
                            <td><button class="btn-sm" onclick="selectTrip('${s.route}', '${s.bus}')">Select</button></td>
                        </tr>
                    `;
                }).join('');
            }

            const startBtn = document.getElementById('startBtn');
            const endBtn = document.getElementById('endBtn');
            const label = document.getElementById('tripLabel');
            const trackBar = document.getElementById('trackingStatus');
            const mapEl = document.getElementById('driverMap');

            window.selectTrip = (route, bus) => {
                if (trackingInterval) return alert('Please end your current active trip first.');
                activeTrip = { route, bus };
                document.getElementById('routeLabel').innerText = route;
                document.getElementById('busLabel').innerText = `Assigned Bus: ${bus}`;
            };

            const beginTracking = async (trip) => {
                activeTrip = trip;
                localStorage.setItem('dtcsl_active_trip', JSON.stringify(trip));

                document.getElementById('routeLabel').innerText = trip.route;
                document.getElementById('busLabel').innerText = `Assigned Bus: ${trip.bus}`;

                label.innerText = 'Active Duty';
                label.className = 'trip-status status-active';
                startBtn.style.display = 'none';
                endBtn.style.display = 'inline-block';
                trackBar.classList.add('visible');
                mapEl.style.display = 'block';

                if (!map) {
                    map = L.map('driverMap').setView([28.6139, 77.2090], 12);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors'
                    }).addTo(map);
                }

                // Try fetching route to draw it on map
                try {
                    const routesRes = await API.getRoutes();
                    const routeDetails = routesRes.find(r => r.routeId === trip.route);
                    if (routeDetails && routeDetails.coordinates && routeDetails.coordinates.length > 0) {
                        const latlngs = routeDetails.coordinates.map(c => [c.lat, c.lng]);
                        if (routeLayer) map.removeLayer(routeLayer);
                        routeLayer = L.polyline(latlngs, {color: '#9FE870', weight: 5}).addTo(map);
                        map.fitBounds(routeLayer.getBounds(), { padding: [20, 20] });
                    }
                } catch(e) {
                    console.error("Could not fetch route details for map:", e);
                }

                // Start tracking loop
                if (trackingInterval) clearInterval(trackingInterval);
                trackingInterval = setInterval(() => {
                    const lat = 28.6139 + (Math.random() - 0.5) * 0.01;
                    const lng = 77.2090 + (Math.random() - 0.5) * 0.01;
                    SocketClient.sendLocation(trip.bus, lat, lng, user.fullName);
                    
                    if (!driverMarker) {
                        driverMarker = L.marker([lat, lng]).addTo(map).bindPopup('You are here');
                    } else {
                        driverMarker.setLatLng([lat, lng]);
                    }
                }, 3000);
            };

            startBtn.onclick = () => {
                if(!activeTrip) { alert('Please select a trip first!'); return; }
                beginTracking(activeTrip);
            };

            endBtn.onclick = () => {
                localStorage.removeItem('dtcsl_active_trip');
                activeTrip = null;
                label.innerText = 'Not Started';
                label.className = 'trip-status status-idle';
                startBtn.style.display = 'inline-block';
                endBtn.style.display = 'none';
                trackBar.classList.remove('visible');
                mapEl.style.display = 'none';
                
                clearInterval(trackingInterval);
                trackingInterval = null;
                
                document.getElementById('routeLabel').innerText = 'Select Trip 🚌';
                document.getElementById('busLabel').innerText = 'Assigned Bus: Ready';
                UI.showAlert('Trip Ended Successfully! 🏁');
            };

            // Auto-resume trip if exists in localStorage (survives tab switch / refresh)
            const savedTrip = localStorage.getItem('dtcsl_active_trip');
            if (savedTrip) {
                beginTracking(JSON.parse(savedTrip));
            }
        });
    </script>
</body>
</html>
